events {
    worker_connections 1024;
}

http {
    # Cài đặt chung
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Ghi log
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Upstream servers ─────────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:8000;
    }

    upstream health_service {
        server health-service:8001;
    }

    upstream ml_service {
        server ml-service:8002;
    }

    # ─── Server block ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Gzip compression
        gzip on;
        gzip_types text/plain application/json application/javascript text/css;

        # Timeout cho ML inference
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # ─── Auth Service endpoints ─────────────────────────────────────────
        location /auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Health Service endpoints ────────────────────────────────────────
        location /api/ {
            proxy_pass http://health_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── ML Service endpoints ────────────────────────────────────────────
        location /ml/ {
            proxy_pass http://ml_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # ML cần thêm timeout
            proxy_read_timeout 120s;
        }

        # ─── Health check ────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ─── API Documentation ───────────────────────────────────────────────
        location /docs/auth {
            proxy_pass http://auth_service/docs;
        }

        location /docs/health {
            proxy_pass http://health_service/docs;
        }

        location /docs/ml {
            proxy_pass http://ml_service/docs;
        }
    }
}
