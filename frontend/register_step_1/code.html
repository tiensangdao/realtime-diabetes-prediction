<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DiabetesGuard - Register Step 1</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e87ad",
                        "primary-dark": "#236a8a",
                        "background-light": "#f6f7f8",
                        "background-dark": "#131b1f",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1c262c",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary selection:text-white">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-xl">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm p-4 pb-2 justify-between">
<button aria-label="Go back" class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Tạo tài khoản</h2>
</header>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 px-6 py-2">
<div class="flex gap-6 justify-between">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal">Bước 1 trên 2</p>
<p class="text-primary font-bold text-sm">50%</p>
</div>
<div class="rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden h-2">
<div class="h-full rounded-full bg-primary transition-all duration-500 ease-out" style="width: 50%;"></div>
</div>
</div>
<!-- Scrollable Content -->
<main class="flex-1 flex flex-col p-6 gap-6 pb-24">
<!-- Role Selector -->
<section>
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold leading-tight mb-4">Chọn vai trò của bạn</h3>
<div class="grid grid-cols-2 gap-4">
<!-- Patient Role (Active) -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="role" type="radio" value="patient"/>
<div class="flex flex-col items-center gap-3 p-4 rounded-2xl bg-surface-light dark:bg-surface-dark border-2 border-primary shadow-sm transition-all hover:shadow-md peer-checked:bg-primary/5 peer-checked:shadow-primary/20">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-3xl">
                                🧑‍🦳
                            </div>
<div class="text-center">
<p class="text-slate-900 dark:text-white text-base font-bold leading-normal">Bệnh nhân</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Theo dõi sức khỏe</p>
</div>
<!-- Checkmark for active state -->
<div class="absolute top-3 right-3 text-primary opacity-100 transition-opacity">
<span class="material-symbols-outlined filled" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Doctor Role (Inactive) -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="role" type="radio" value="doctor"/>
<div class="flex flex-col items-center gap-3 p-4 rounded-2xl bg-surface-light dark:bg-surface-dark border-2 border-transparent hover:border-slate-300 dark:hover:border-slate-600 peer-checked:border-primary shadow-sm transition-all hover:shadow-md peer-checked:bg-primary/5">
<div class="size-16 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-3xl grayscale group-hover:grayscale-0 transition-all">
                                👨‍⚕️
                            </div>
<div class="text-center">
<p class="text-slate-900 dark:text-white text-base font-bold leading-normal">Bác sĩ</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Quản lý bệnh nhân</p>
</div>
<!-- Checkmark hidden by default -->
<div class="absolute top-3 right-3 text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined filled" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
</div>
</section>
<!-- Personal Information Form -->
<section class="flex flex-col gap-5">
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold leading-tight">Thông tin cá nhân</h3>
<!-- Full Name -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="fullname">Họ và tên</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">person</span>
</div>
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark pl-12 pr-4 py-3.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-2 sm:text-base leading-6 shadow-sm transition-all" id="fullname" placeholder="Nguyễn Văn A" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark pl-12 pr-4 py-3.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-2 sm:text-base leading-6 shadow-sm transition-all" id="email" placeholder="example@email.com" type="email"/>
</div>
</div>
<!-- Phone -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="phone">Số điện thoại</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">call</span>
</div>
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark pl-12 pr-4 py-3.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-2 sm:text-base leading-6 shadow-sm transition-all" id="phone" placeholder="0912 345 678" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark pl-12 pr-12 py-3.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-2 sm:text-base leading-6 shadow-sm transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="confirm-password">Xác nhận mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">lock_reset</span>
</div>
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark pl-12 pr-12 py-3.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-2 sm:text-base leading-6 shadow-sm transition-all" id="confirm-password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary-dark text-white text-lg font-bold py-4 rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Tiếp theo</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
